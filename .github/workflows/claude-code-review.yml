name: Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8

    - name: Quality check
      run: |
        echo "## 📋 코드 품질 검토" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # 기본 문법 검사
        python -c "import py_compile; import glob; [py_compile.compile(f, doraise=True) for f in glob.glob('pykis/**/*.py', recursive=True)]" && echo "✅ 문법 검사 통과" >> $GITHUB_STEP_SUMMARY || echo "❌ 문법 오류 발견" >> $GITHUB_STEP_SUMMARY

        # 스타일 검사
        black --check pykis/ --diff || echo "⚠️ 포맷팅 필요" >> $GITHUB_STEP_SUMMARY
        isort --check-only pykis/ --diff || echo "⚠️ import 정렬 필요" >> $GITHUB_STEP_SUMMARY
        flake8 pykis/ --max-line-length=100 --ignore=E501,W503 || echo "⚠️ 린팅 이슈 발견" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🔍 코드 품질 검토 완료" >> $GITHUB_STEP_SUMMARY