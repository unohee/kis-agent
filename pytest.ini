[pytest]
# pytest 설정 파일

# 테스트 디렉토리
testpaths = tests

# 테스트 파일 패턴
python_files = test_*.py *_test.py

# 테스트 함수 패턴
python_functions = test_*

# 테스트 클래스 패턴
python_classes = Test*

# 마커 정의
markers =
    unit: 단위 테스트
    integration: 통합 테스트
    live: 실제 API 연동 테스트 (skip by default)
    slow: 느린 테스트
    refactored: 리팩터링된 API 테스트

# 기본 옵션
addopts =
    -v
    --tb=short
    --strict-markers
    -W ignore::DeprecationWarning:pykis
    --cov=pykis
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=15

# 로그 설정
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 경고 필터
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning:pykis.stock.api
    ignore::DeprecationWarning:pykis.account.api

# 캐시 디렉토리
cache_dir = .pytest_cache

# 코드 커버리지 설정
[coverage:run]
source = pykis
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */examples/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
    if TYPE_CHECKING: