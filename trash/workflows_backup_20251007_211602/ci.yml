name: CI

on:
  push:
    branches: [ main, master, develop, dev ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    continue-on-error: true  # 초기 도입 부담 완화용(점진적 엄격화 권장)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install .[dev,all]

      - name: Black (check)
        run: black --check pykis tests

      - name: isort (check)
        run: isort --check-only pykis tests

      - name: Flake8
        run: flake8 pykis tests

      - name: MyPy (library only)
        run: mypy pykis

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: '1'
        run: |
          python -m pip install -U pip
          # dev + websocket extras 설치 (테스트 커버)
          pip install .[dev,all]

      - name: Run unit tests (exclude integration)
        env:
          # 통합/라이브 테스트는 기본 비활성화
          RUN_LIVE_TESTS: '0'
        run: |
          pytest -v -m "not integration" --cov=pykis --cov-report=xml --durations=20

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

  build:
    name: Build sdist/wheel
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build backend
        run: |
          python -m pip install -U pip
          pip install build

      - name: Build
        run: python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

